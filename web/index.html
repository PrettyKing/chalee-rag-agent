<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>知识库查询系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --text: #e8e8ea;
      --text-muted: #6b6b78;
      --text-dim: #3a3a44;
      --accent: #c8f057;
      --accent-dim: rgba(200, 240, 87, 0.12);
      --accent-glow: rgba(200, 240, 87, 0.25);
      --user-bg: #1e2a14;
      --user-border: rgba(200, 240, 87, 0.2);
      --ai-bg: #16161a;
      --radius: 16px;
      --radius-sm: 10px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      gap: 6px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-icon svg { width: 18px; height: 18px; }
    .logo-text {
      font-family: 'Instrument Serif', serif;
      font-size: 17px;
      color: var(--text);
      letter-spacing: -0.2px;
    }
    .new-chat-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      background: var(--accent-dim);
      border: 1px solid rgba(200, 240, 87, 0.15);
      color: var(--accent);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
      margin-bottom: 16px;
    }
    .new-chat-btn:hover { background: rgba(200,240,87,0.18); border-color: rgba(200,240,87,0.3); }
    .sidebar-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 4px 12px;
      margin-top: 4px;
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-item:hover { background: var(--surface2); color: var(--text); }
    .sidebar-item.active { background: var(--surface2); color: var(--text); }
    .sidebar-item svg { flex-shrink: 0; opacity: 0.5; }
    .sidebar-item.active svg { opacity: 1; }
    .sidebar-bottom {
      margin-top: auto;
      border-top: 1px solid var(--border);
      padding-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      background: var(--surface2);
      font-size: 12px;
      color: var(--text-muted);
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #3a3a44;
      flex-shrink: 0;
    }
    .status-dot.online { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-title {
      font-family: 'Instrument Serif', serif;
      font-size: 18px;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .topbar-badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(200,240,87,0.2);
      font-weight: 500;
    }
    .topbar-actions { display: flex; align-items: center; gap: 8px; }
    .icon-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
    }
    .icon-btn:hover { background: var(--border2); color: var(--text); }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      padding: 60px 40px;
      opacity: 0;
      animation: fadeUp 0.6s 0.2s ease forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .empty-glyph {
      font-family: 'Instrument Serif', serif;
      font-size: 52px;
      line-height: 1;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    .empty-title {
      font-family: 'Instrument Serif', serif;
      font-size: 26px;
      color: var(--text);
      letter-spacing: -0.5px;
    }
    .empty-sub {
      font-size: 14px;
      color: var(--text-muted);
      max-width: 340px;
      line-height: 1.6;
    }
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
      max-width: 520px;
    }
    .suggestion-chip {
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: var(--surface);
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .suggestion-chip:hover {
      border-color: rgba(200,240,87,0.3);
      background: var(--accent-dim);
      color: var(--accent);
    }
    .msg {
      display: flex;
      gap: 14px;
      animation: fadeUp 0.3s ease;
    }
    .msg.user { flex-direction: row-reverse; }
    .avatar {
      width: 34px; height: 34px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
    }
    .avatar.ai { background: var(--accent); color: #0d0d0f; font-family: 'Instrument Serif', serif; }
    .avatar.user { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border2); }
    .bubble {
      max-width: 680px;
      border-radius: var(--radius);
      padding: 14px 18px;
      font-size: 14px;
      line-height: 1.7;
      position: relative;
    }
    .msg.ai .bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-radius: 4px var(--radius) var(--radius) var(--radius);
      color: var(--text);
    }
    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid var(--user-border);
      border-radius: var(--radius) 4px var(--radius) var(--radius);
      color: #d4e8a0;
    }
    .bubble-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .bubble-name {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .bubble-time { font-size: 11px; color: var(--text-dim); }
    .sources {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .source-tag {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
    }
    .source-tag svg { width: 10px; height: 10px; opacity: 0.6; }
    .thinking .bubble { padding: 16px 18px; }
    .dots { display: flex; gap: 5px; align-items: center; }
    .dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      animation: bounce 1.2s ease infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }
    .input-area {
      flex-shrink: 0;
      padding: 16px 28px 20px;
      background: var(--bg);
    }
    .input-box {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 12px 12px 12px 18px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-box:focus-within {
      border-color: rgba(200,240,87,0.35);
      box-shadow: 0 0 0 3px rgba(200,240,87,0.07);
    }
    .input-box textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      line-height: 1.6;
      max-height: 160px;
      min-height: 22px;
      overflow-y: auto;
    }
    .input-box textarea::placeholder { color: var(--text-dim); }
    .input-box textarea::-webkit-scrollbar { width: 3px; }
    .input-box textarea::-webkit-scrollbar-thumb { background: var(--border2); }
    .send-btn {
      width: 36px; height: 36px;
      border-radius: 9px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .send-btn:hover { background: #d4f566; transform: scale(1.05); }
    .send-btn:disabled { background: var(--surface2); cursor: not-allowed; transform: none; }
    .send-btn:disabled svg { opacity: 0.3; }
    .send-btn svg { color: #0d0d0f; }
    .input-hint {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
      padding: 0 4px;
    }
    .hint-text { font-size: 11px; color: var(--text-dim); }
    .model-tag { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-dim); }
    .right-panel {
      width: 280px;
      flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      gap: 6px;
      overflow-y: auto;
    }
    .panel-title {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 4px 4px 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }
    .doc-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface2);
      cursor: pointer;
      transition: all 0.15s;
    }
    .doc-item:hover { border-color: var(--border2); }
    .doc-icon {
      width: 28px; height: 28px;
      border-radius: 6px;
      background: var(--accent-dim);
      border: 1px solid rgba(200,240,87,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .doc-icon svg { width: 14px; height: 14px; color: var(--accent); }
    .doc-info { flex: 1; min-width: 0; }
    .doc-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .doc-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .add-doc-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px;
      border-radius: var(--radius-sm);
      border: 1px dashed var(--border2);
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
      margin-top: 4px;
    }
    .add-doc-btn:hover {
      border-color: rgba(200,240,87,0.3);
      color: var(--accent);
      background: var(--accent-dim);
    }
    .add-doc-btn input[type=file] { display: none; }
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 8px;
    }
    .stat-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px;
      text-align: center;
    }
    .stat-num {
      font-family: 'Instrument Serif', serif;
      font-size: 22px;
      color: var(--accent);
      line-height: 1;
    }
    .stat-lbl {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 3px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0d0d0f" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <span class="logo-text">知识库</span>
  </div>

  <button class="new-chat-btn" onclick="newChat()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    新对话
  </button>

  <div class="sidebar-label">最近对话</div>
  <div class="sidebar-item active" onclick="loadSession(this,'当前会话')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    当前会话
  </div>
  <div class="sidebar-item" onclick="loadSession(this,'RAG 技术介绍')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    RAG 技术介绍
  </div>
  <div class="sidebar-item" onclick="loadSession(this,'产品文档检索')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    产品文档检索
  </div>

  <div class="sidebar-bottom">
    <div class="status-pill">
      <div class="status-dot" id="sidebarDot"></div>
      <span id="sidebarStatus">连接中...</span>
    </div>
    <div class="sidebar-item" style="margin-top:4px" onclick="showSettings()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      设置
    </div>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-title">知识库查询</span>
      <span class="topbar-badge" id="modelBadge">Workers AI</span>
    </div>
    <div class="topbar-actions">
      <div class="icon-btn" title="上传文档" onclick="document.getElementById('fileInput').click()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <input type="file" id="fileInput" multiple accept=".txt,.md" style="display:none" onchange="handleFileUpload(this.files)">
      </div>
      <div class="icon-btn" title="统计信息" onclick="loadStats()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      </div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="empty-glyph">⌘</div>
      <div class="empty-title">向知识库提问</div>
      <div class="empty-sub">上传你的文档，然后用自然语言提问，AI 将从文档中检索相关内容并生成回答。</div>
      <div class="suggestions">
        <div class="suggestion-chip" onclick="fillQuestion(this.textContent)">什么是 RAG 技术？</div>
        <div class="suggestion-chip" onclick="fillQuestion(this.textContent)">总结文档的主要内容</div>
        <div class="suggestion-chip" onclick="fillQuestion(this.textContent)">有哪些关键概念？</div>
        <div class="suggestion-chip" onclick="fillQuestion(this.textContent)">如何使用这个系统？</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-box">
      <textarea
        id="questionInput"
        placeholder="输入问题，或上传文档后提问..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendQuery()" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="input-hint">
      <span class="hint-text">⏎ 发送 · ⇧⏎ 换行</span>
      <div class="model-tag">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
        <span id="apiUrlShort">workers.dev</span>
      </div>
    </div>
  </div>
</main>

<aside class="right-panel">
  <div class="panel-title">知识库文档</div>
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-num" id="docCount">0</div>
      <div class="stat-lbl">文档</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="chunkCount">—</div>
      <div class="stat-lbl">向量块</div>
    </div>
  </div>
  <div style="height:8px"></div>
  <div id="docList"></div>
  <label class="add-doc-btn">
    <input type="file" multiple accept=".txt,.md" onchange="handleFileUpload(this.files)">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    添加文档
  </label>
</aside>

<div class="toast" id="toast"></div>

<script>
  const API_BASE = 'https://chalee-rag-agent.chalee695469701.workers.dev';
  let uploadedDocs = [];
  let isLoading = false;

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('apiUrlShort').textContent = new URL(API_BASE).hostname.split('.')[0] + '.workers.dev';
    checkHealth();
    loadStats();
    const ta = document.getElementById('questionInput');
    ta.addEventListener('input', () => {
      document.getElementById('sendBtn').disabled = !ta.value.trim() || isLoading;
    });
  });

  async function checkHealth() {
    try {
      const r = await fetch(`${API_BASE}/health`);
      const ok = r.ok;
      document.getElementById('sidebarDot').classList.toggle('online', ok);
      document.getElementById('sidebarStatus').textContent = ok ? '已连接' : '连接失败';
    } catch {
      document.getElementById('sidebarStatus').textContent = '连接失败';
    }
  }

  async function loadStats() {
    try {
      const r = await fetch(`${API_BASE}/stats`);
      if (!r.ok) return;
      const d = await r.json();
      document.getElementById('chunkCount').textContent = d.vectorCount ?? '—';
    } catch {}
  }

  async function handleFileUpload(files) {
    if (!files || files.length === 0) return;
    showToast(`正在上传 ${files.length} 个文件...`);
    const formData = new FormData();
    for (const f of files) formData.append('documents', f);
    try {
      const r = await fetch(`${API_BASE}/upload`, { method: 'POST', body: formData });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error);
      for (const name of d.files) {
        addDocToPanel(name, d.chunksCreated);
        uploadedDocs.push(name);
      }
      document.getElementById('docCount').textContent = uploadedDocs.length;
      loadStats();
      showToast(`✓ 上传成功：${d.files.join(', ')}，生成 ${d.chunksCreated} 个向量块`);
    } catch (e) {
      showToast(`✕ 上传失败：${e.message}`);
    }
  }

  function addDocToPanel(name, chunks) {
    const list = document.getElementById('docList');
    const el = document.createElement('div');
    el.className = 'doc-item';
    el.innerHTML = `
      <div class="doc-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <div class="doc-info">
        <div class="doc-name">${name}</div>
        <div class="doc-meta">${chunks} 个向量块</div>
      </div>`;
    list.appendChild(el);
  }

  async function sendQuery() {
    const input = document.getElementById('questionInput');
    const question = input.value.trim();
    if (!question || isLoading) return;
    document.getElementById('emptyState').style.display = 'none';
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;
    appendMessage('user', question);
    input.value = '';
    autoResize(input);
    const thinkingId = appendThinking();
    try {
      const r = await fetch(`${API_BASE}/query`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });
      const d = await r.json();
      removeThinking(thinkingId);
      if (!r.ok) throw new Error(d.error);
      appendMessage('ai', d.answer, d.sources || []);
      loadStats();
    } catch (e) {
      removeThinking(thinkingId);
      appendMessage('ai', `抱歉，发生了错误：${e.message}`, []);
    } finally {
      isLoading = false;
      document.getElementById('sendBtn').disabled = !input.value.trim();
    }
  }

  function appendMessage(role, text, sources = []) {
    const wrap = document.getElementById('messages');
    const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    const el = document.createElement('div');
    el.className = `msg ${role}`;
    el.innerHTML = `
      <div class="avatar ${role}">${role === 'ai' ? 'K' : '我'}</div>
      <div class="bubble">
        <div class="bubble-meta">
          <span class="bubble-name">${role === 'ai' ? '知识库 AI' : '你'}</span>
          <span class="bubble-time">${time}</span>
        </div>
        <div>${escapeHtml(text).replace(/\n/g, '<br>')}</div>
        ${sources.length ? `<div class="sources">${sources.map(s => `<span class="source-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg>${s}</span>`).join('')}</div>` : ''}
      </div>`;
    wrap.appendChild(el);
    wrap.scrollTop = wrap.scrollHeight;
  }

  let thinkingCounter = 0;
  function appendThinking() {
    const id = 'thinking-' + thinkingCounter++;
    const wrap = document.getElementById('messages');
    const el = document.createElement('div');
    el.className = 'msg ai thinking';
    el.id = id;
    el.innerHTML = `
      <div class="avatar ai">K</div>
      <div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>`;
    wrap.appendChild(el);
    wrap.scrollTop = wrap.scrollHeight;
    return id;
  }

  function removeThinking(id) { document.getElementById(id)?.remove(); }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  function fillQuestion(text) {
    const el = document.getElementById('questionInput');
    el.value = text;
    el.focus();
    autoResize(el);
    document.getElementById('sendBtn').disabled = false;
  }

  function newChat() {
    const wrap = document.getElementById('messages');
    wrap.innerHTML = `
      <div class="empty-state" id="emptyState">
        <div class="empty-glyph">⌘</div>
        <div class="empty-title">向知识库提问</div>
        <div class="empty-sub">上传你的文档，然后用自然语言提问，AI 将从文档中检索相关内容并生成回答。</div>
        <div class="suggestions">
          <div class="suggestion-chip" onclick="fillQuestion(this.textContent)">什么是 RAG 技术？</div>
          <div class="suggestion-chip" onclick="fillQuestion(this.textContent)">总结文档的主要内容</div>
          <div class="suggestion-chip" onclick="fillQuestion(this.textContent)">有哪些关键概念？</div>
          <div class="suggestion-chip" onclick="fillQuestion(this.textContent)">如何使用这个系统？</div>
        </div>
      </div>`;
    document.getElementById('questionInput').value = '';
  }

  function loadSession(el, name) {
    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    showToast(`已切换到：${name}`);
  }

  function showSettings() { showToast('设置功能即将上线'); }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  setInterval(checkHealth, 30000);
</script>
</body>
</html>

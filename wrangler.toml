name = "chalee-rag-agent"
main = "worker/src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ============ Workers AI ============
[ai]
binding = "AI"

# ============ Vectorize 向量数据库 ============
[[vectorize]]
binding = "VECTORIZE"
index_name = "rag-documents"

# ============ R2 文件存储 ============
[[r2_buckets]]
binding = "R2"
bucket_name = "chalee-rag-uploads"

# ============ KV 缓存 ============
[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"          # 执行 wrangler kv namespace create RAG_CACHE 获取

# ============ D1 元数据库 ============
[[d1_databases]]
binding = "DB"
database_name = "rag-metadata"
database_id = "YOUR_D1_DATABASE_ID"  # 执行 wrangler d1 create rag-metadata 获取

# ============ 环境变量 ============
[vars]
CHUNK_SIZE = "800"
CHUNK_OVERLAP = "100"
TOP_K_RESULTS = "5"
MAX_TOKENS = "800"

# ============ 可选: 使用 OpenAI 替代 Workers AI ============
# 在 wrangler secret put OPENAI_API_KEY 中配置
# [vars]
# USE_OPENAI = "true"

# ============ 本地开发 ============
[dev]
port = 8787
local_protocol = "http"
